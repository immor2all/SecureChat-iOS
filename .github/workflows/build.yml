name: Build IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install briefcase toga cryptography
          
      - name: Build iOS app
        run: |
          briefcase create iOS
          briefcase build iOS
          briefcase package iOS
          
      - name: Debug - List all files
        run: |
          echo "=== Listing all files ==="
          find . -type f | head -50
          echo "=== Looking for IPA and APP ==="
          find . -name "*.ipa" -type f
          find . -name "*.app" -type f
          echo "=== Looking in Xcode build folder ==="
          ls -la ./iOS/Xcode/build/ || true
          ls -la ./iOS/Xcode/build/Release-iphoneos/ || true
          ls -la ./iOS/Xcode/build/Debug-iphoneos/ || true
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SecureChat-iOS
          path: |
            ./iOS/Xcode/build/Release-iphoneos/*.ipa
            ./iOS/Xcode/build/Debug-iphoneos/*.ipa
            ./iOS/Xcode/build/*.ipa
            **/*.ipa
            **/*.app
