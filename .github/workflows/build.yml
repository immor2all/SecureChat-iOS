name: Build IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install briefcase toga cryptography
          
      - name: Build iOS app
        run: |
          briefcase create iOS
          briefcase build iOS
          briefcase package iOS
          
      - name: Find IPA
        run: |
          echo "Looking for IPA files..."
          find . -name "*.ipa" -type f
          find . -name "*.app" -type f
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SecureChat-iOS
          path: |
            **/*.ipa
            **/*.app
