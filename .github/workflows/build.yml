name: Build IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install briefcase toga cryptography
          
      - name: Build iOS app
        run: |
          briefcase create iOS
          briefcase build iOS
          briefcase package iOS
          
      - name: Find everything
        run: |
          echo "=== CURRENT DIRECTORY ==="
          pwd
          echo "=== LIST ALL FILES ==="
          find . -type f | head -200
          echo "=== SEARCH FOR IPA ==="
          find . -name "*.ipa" -type f
          echo "=== SEARCH FOR APP ==="
          find . -name "*.app" -type f
          echo "=== SEARCH FOR XCODEPROJ ==="
          find . -name "*.xcodeproj" -type d
          echo "=== CHECK BUILD FOLDER ==="
          ls -la ./build/ || true
          ls -la ./build/securechat/ || true
          ls -la ./build/securechat/ios/ || true
          ls -la ./build/securechat/ios/xcode/ || true
          
      - name: Upload any found files
        uses: actions/upload-artifact@v4
        with:
          name: SecureChat-iOS
          path: |
            ./build/**/*.ipa
            ./build/**/*.app
            ./**/*.ipa
            ./**/*.app

