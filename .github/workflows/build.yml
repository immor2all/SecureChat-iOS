name: Build IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install briefcase toga cryptography
          
      - name: Build iOS app for device
        run: |
          briefcase create iOS
          briefcase build iOS --device "iPhone"
          briefcase package iOS --device "iPhone" --adhoc-sign
          
      - name: Find IPA
        run: |
          echo "=== Looking for IPA ==="
          find . -name "*.ipa" -type f
          echo "=== Looking in build folder ==="
          find ./build -name "*.ipa" -type f
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SecureChat-iOS
          path: |
            ./build/**/*.ipa
            ./**/*.ipa

